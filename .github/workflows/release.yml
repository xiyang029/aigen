name: Release

on:
  push:
    branches:
      - main
    paths:
      - pubspec.yaml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Read version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          current_version="$(grep -E '^version:' pubspec.yaml | awk '{print $2}')"
          previous_version="$(git show HEAD^:pubspec.yaml 2>/dev/null | grep -E '^version:' | awk '{print $2}' || true)"

          if [[ -n "${previous_version}" && "${current_version}" == "${previous_version}" ]]; then
            echo "Version unchanged: ${current_version}"
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          version_name="${current_version%%+*}"
          version_code="${current_version##*+}"

          echo "changed=true" >> "$GITHUB_OUTPUT"
          echo "current=${current_version}" >> "$GITHUB_OUTPUT"
          echo "version_name=${version_name}" >> "$GITHUB_OUTPUT"
          echo "version_code=${version_code}" >> "$GITHUB_OUTPUT"

      - name: Stop when version did not change
        if: steps.version.outputs.changed != 'true'
        run: echo "No release needed."

      - name: Verify release signing files
        if: steps.version.outputs.changed == 'true'
        run: |
          test -f android/key.properties
          test -f android/app/aigen-release.p12

      - name: Install dependencies
        if: steps.version.outputs.changed == 'true'
        run: flutter pub get

      - name: Build release APKs
        if: steps.version.outputs.changed == 'true'
        run: >
          flutter build apk
          --release
          --split-per-abi
          --obfuscate
          --split-debug-info=build/app/outputs/symbols
          --no-tree-shake-icons

      - name: Create GitHub Release
        if: steps.version.outputs.changed == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version_name }}
          name: aigen
          generate_release_notes: true
          files: |
            build/app/outputs/flutter-apk/*.apk
          fail_on_unmatched_files: true
